<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>formulon-cell</title>
    <link rel="icon" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%234c6ef5'/%3E%3Cpath d='M2 6h12M2 10h12M6 2v12M10 2v12' stroke='white' stroke-width='1.4' stroke-linecap='square' fill='none'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- ── Title bar ─────────────────────────────────────────────── -->
      <header class="app__title">
        <div class="app__title-left">
          <span class="app__brand">
            <span class="app__brand-mark" aria-hidden="true">
              <!-- Excel-evocative cross/grid mark, kept generic to avoid the
                   Microsoft trademark. White strokes on the green chip. -->
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 7l10 10M17 7L7 17" />
              </svg>
            </span>
            <span class="app__brand-name">formulon</span>
            <span class="app__brand-sep" aria-hidden="true">·</span>
            <span class="app__brand-doc" id="doc-name">Untitled workbook</span>
          </span>
          <span class="app__crumb" id="doc-state">Saved</span>
        </div>
        <div class="app__title-right">
          <span class="app__pill" id="engine-pill">engine&nbsp;·&nbsp;loading</span>
          <button class="app__theme" id="theme-toggle" type="button" aria-pressed="false" title="Toggle theme">
            <svg class="app__theme-ic" viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
              <circle cx="8" cy="8" r="3" fill="currentColor" />
              <g stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
                <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4" />
              </g>
            </svg>
            <span class="app__theme-label" id="theme-label">Light</span>
          </button>
        </div>
      </header>

      <div id="ribbon-root" class="app__ribbon-root"></div>
      <input type="file" id="file-input" accept=".xlsx,.xlsm" hidden />

      <!-- ── Sheet host (core mounts formulabar + grid here) ───────── -->
      <div id="sheet" class="app__sheet"></div>

      <!-- ── Bottom: sheet tabs + status ───────────────────────────── -->
      <footer class="app__bottombar">
        <div class="app__tabs" aria-label="Sheets">
          <button class="app__tabs-nav" type="button" id="btn-sheet-prev" title="Previous sheet" aria-label="Previous sheet">
            <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3l-5 5 5 5" /></svg>
          </button>
          <button class="app__tabs-nav" type="button" id="btn-sheet-next" title="Next sheet" aria-label="Next sheet">
            <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3l5 5-5 5" /></svg>
          </button>
          <div class="app__tabs-list" id="sheet-tabs" role="tablist" aria-label="Sheets"></div>
          <button class="app__tab-add" type="button" id="btn-sheet-add" title="Add sheet" aria-label="Add sheet">
            <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M8 3v10M3 8h10" /></svg>
          </button>
        </div>

        <div class="app__status" aria-live="polite">
          <span class="app__status-block app__status-block--state">
            <span class="app__status-dot" aria-hidden="true"></span>
            <span id="status-state">Ready</span>
          </span>
          <span class="app__status-block app__status-block--selection" id="status-selection">A1</span>
          <span class="app__status-block app__status-block--metric" id="status-metric"></span>
          <span class="app__status-block app__status-block--objects" id="status-objects" hidden></span>
          <span class="app__status-block app__status-block--engine" id="status-engine">—</span>

          <!-- Excel-style zoom control: − [100%] + with a thin slider rail. -->
          <span class="app__status-block app__zoomctl" aria-label="Zoom">
            <button class="app__zoom-step" id="btn-zoom-out" type="button" title="Zoom out" aria-label="Zoom out">−</button>
            <span class="app__zoom-rail" aria-hidden="true">
              <span class="app__zoom-rail-fill" id="zoom-rail-fill"></span>
              <span class="app__zoom-rail-thumb" id="zoom-rail-thumb"></span>
            </span>
            <button class="app__zoom-step" id="btn-zoom-in" type="button" title="Zoom in" aria-label="Zoom in">+</button>
            <span class="app__zoom" id="zoom-display" title="Cycle zoom">100%</span>
          </span>
        </div>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
