<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>formulon-cell</title>
    <link rel="icon" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%234c6ef5'/%3E%3Cpath d='M2 6h12M2 10h12M6 2v12M10 2v12' stroke='white' stroke-width='1.4' stroke-linecap='square' fill='none'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- ── Title bar ─────────────────────────────────────────────── -->
      <header class="app__title">
        <div class="app__title-left">
          <span class="app__autosave">
            <span class="app__autosave-label" data-shell-i18n="autosave">自動保存</span>
            <button class="app__autosave-switch" data-shell-i18n-label="autosave" type="button" aria-pressed="false" aria-label="自動保存"></button>
          </span>
          <button class="app__title-icon" data-shell-i18n-label="home" type="button" aria-label="ホーム" title="ホーム">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linejoin="round">
              <path d="M3 9.2 10 3l7 6.2" />
              <path d="M5.2 8.4v8h9.6v-8" />
            </svg>
          </button>
          <button class="app__title-icon" data-shell-i18n-label="save" type="button" aria-label="保存" title="保存">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.45" stroke-linejoin="round">
              <path d="M4 3.5h10.2L16 5.3v11.2H4z" />
              <path d="M6.2 3.5v4.2h7.4V3.5" />
              <path d="M6.8 13.4h6.4" />
            </svg>
          </button>
          <button class="app__title-icon" data-shell-i18n-label="saveAs" type="button" aria-label="名前を付けて保存" title="名前を付けて保存">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.45" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 3.5h9.8L16 5.7v10.8H4z" />
              <path d="M6.4 3.5v4h6.8" />
              <path d="M12.2 14.8 16.8 10" />
              <path d="m15.5 9.2 2.1 2.1" />
            </svg>
          </button>
          <button class="app__title-icon" data-shell-i18n-label="undo" type="button" aria-label="元に戻す" title="元に戻す">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7.2 5.2 3.8 8.6l3.4 3.3" />
              <path d="M4.2 8.6h7.2c3 0 4.8 1.6 4.8 4.2 0 1-.3 1.9-.9 2.6" />
            </svg>
          </button>
          <button class="app__title-icon app__title-icon--muted" data-shell-i18n-label="redo" type="button" aria-label="やり直し" title="やり直し">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12.8 5.2 16.2 8.6l-3.4 3.3" />
              <path d="M15.8 8.6H8.6c-3 0-4.8 1.6-4.8 4.2 0 1 .3 1.9.9 2.6" />
            </svg>
          </button>
          <button class="app__title-more" data-shell-i18n-label="more" type="button" aria-label="その他" title="その他">…</button>
        </div>
        <div class="app__title-center">
          <span class="app__brand-doc" id="doc-name">Book1</span>
          <span class="app__crumb" id="doc-state">Saved</span>
        </div>
        <div class="app__title-right">
          <label class="app__search" data-shell-i18n-label="search" aria-label="検索">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <circle cx="7" cy="7" r="4.5" />
              <path d="m10.4 10.4 3.1 3.1" stroke-linecap="round" />
            </svg>
            <input type="search" data-shell-i18n-placeholder="searchPlaceholder" data-shell-i18n-label="searchCommands" aria-label="コマンドの検索" placeholder="検索 (Cmd + Ctrl + U)" />
          </label>
          <button class="app__comment" data-shell-i18n-label="comments" type="button" aria-label="コメント" title="コメント">
            <svg viewBox="0 0 18 18" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round">
              <path d="M3 3.8h12v8.1H7.2L3 15.2z" />
            </svg>
            <span data-shell-i18n="comments">コメント</span>
          </button>
          <button class="app__share" data-shell-i18n-label="share" type="button" aria-label="共有" title="共有">
            <svg viewBox="0 0 18 18" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.45" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6.2 5.4 9 2.6l2.8 2.8" />
              <path d="M9 2.8v8.5" />
              <path d="M4.1 8.3v6.2h9.8V8.3" />
            </svg>
            <span data-shell-i18n="share">共有</span>
            <span aria-hidden="true">⌄</span>
          </button>
          <button class="app__theme" id="theme-toggle" type="button" aria-pressed="false" title="Toggle theme" aria-label="Toggle theme">
            <span class="app__theme-label" id="theme-label">Light</span>
          </button>
        </div>
      </header>

      <div id="ribbon-root" class="app__ribbon-root"></div>
      <input type="file" id="file-input" accept=".xlsx,.xlsm" hidden />

      <!-- ── Sheet host (core mounts formulabar + grid here) ───────── -->
      <div id="sheet" class="app__sheet"></div>

      <!-- ── Bottom: sheet tabs + status ───────────────────────────── -->
      <footer class="app__bottombar">
        <div class="app__tabs" data-shell-i18n-label="sheets" aria-label="Sheets">
          <button class="app__tabs-nav" data-shell-i18n-label="previousSheet" type="button" id="btn-sheet-prev" title="Previous sheet" aria-label="Previous sheet">
            <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3l-5 5 5 5" /></svg>
          </button>
          <button class="app__tabs-nav" data-shell-i18n-label="nextSheet" type="button" id="btn-sheet-next" title="Next sheet" aria-label="Next sheet">
            <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3l5 5-5 5" /></svg>
          </button>
          <div class="app__tabs-list" id="sheet-tabs" role="tablist" data-shell-i18n-label="sheets" aria-label="Sheets"></div>
          <button class="app__tab-add" data-shell-i18n-label="addSheet" type="button" id="btn-sheet-add" title="Add sheet" aria-label="Add sheet">
            <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M8 3v10M3 8h10" /></svg>
          </button>
        </div>

        <div class="app__status" aria-live="polite">
          <span class="app__status-block app__status-block--state">
            <span class="app__status-dot" aria-hidden="true"></span>
            <span id="status-state" data-shell-i18n="ready">Ready</span>
          </span>
          <span class="app__status-block app__status-block--selection" id="status-selection">A1</span>
          <span class="app__status-block app__status-block--metric" id="status-metric"></span>
          <span class="app__status-block app__status-block--objects" id="status-objects" hidden></span>
          <span class="app__status-block app__status-block--engine" id="status-engine">—</span>

          <!-- Excel-style zoom control: − [100%] + with a thin slider rail. -->
          <span class="app__status-block app__zoomctl" data-shell-i18n-label="zoom" aria-label="Zoom">
            <button class="app__zoom-step" id="btn-zoom-out" data-shell-i18n-label="zoomOut" type="button" title="Zoom out" aria-label="Zoom out">−</button>
            <span class="app__zoom-rail" aria-hidden="true">
              <span class="app__zoom-rail-fill" id="zoom-rail-fill"></span>
              <span class="app__zoom-rail-thumb" id="zoom-rail-thumb"></span>
            </span>
            <button class="app__zoom-step" id="btn-zoom-in" data-shell-i18n-label="zoomIn" type="button" title="Zoom in" aria-label="Zoom in">+</button>
            <span class="app__zoom" id="zoom-display" data-shell-i18n-title="cycleZoom" title="Cycle zoom">100%</span>
          </span>
        </div>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
