<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>formulon-cell</title>
    <link rel="icon" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%234c6ef5'/%3E%3Cpath d='M2 6h12M2 10h12M6 2v12M10 2v12' stroke='white' stroke-width='1.4' stroke-linecap='square' fill='none'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- ── Title bar ─────────────────────────────────────────────── -->
      <header class="app__title">
        <div class="app__title-left">
          <span class="app__brand">
            <span class="app__brand-mark" aria-hidden="true">
              <!-- Excel-evocative cross/grid mark, kept generic to avoid the
                   Microsoft trademark. White strokes on the green chip. -->
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 7l10 10M17 7L7 17" />
              </svg>
            </span>
            <span class="app__brand-name">formulon</span>
            <span class="app__brand-sep" aria-hidden="true">·</span>
            <span class="app__brand-doc" id="doc-name">Untitled workbook</span>
          </span>
          <span class="app__crumb" id="doc-state">Saved</span>
        </div>
        <div class="app__title-right">
          <span class="app__pill" id="engine-pill">engine&nbsp;·&nbsp;loading</span>
          <button class="app__theme" id="theme-toggle" type="button" aria-pressed="false" title="Toggle theme">
            <svg class="app__theme-ic" viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
              <circle cx="8" cy="8" r="3" fill="currentColor" />
              <g stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
                <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4" />
              </g>
            </svg>
            <span class="app__theme-label" id="theme-label">Light</span>
          </button>
        </div>
      </header>

      <!-- ── Menu strip ────────────────────────────────────────────── -->
      <nav class="app__menubar" aria-label="Application menus">
        <div class="app__menu-anchor">
          <button class="app__menubar-item app__menubar-item--file" type="button" id="menu-file" aria-haspopup="menu" aria-expanded="false">File</button>
          <div class="app__dropdown" id="menu-file-dropdown" role="menu" hidden>
            <button class="app__menu-item" type="button" role="menuitem" data-file="new">New (Ctrl+N)</button>
            <button class="app__menu-item" type="button" role="menuitem" data-file="open">Open… (Ctrl+O)</button>
            <button class="app__menu-item" type="button" role="menuitem" data-file="save">Save (Ctrl+S)</button>
            <button class="app__menu-item" type="button" role="menuitem" data-file="save-as">Save As…</button>
          </div>
        </div>
        <button class="app__menubar-item app__menubar-item--current" type="button" aria-current="page">Home</button>
        <button class="app__menubar-item" type="button">Insert</button>
        <button class="app__menubar-item" type="button">Formulas</button>
        <button class="app__menubar-item" type="button">Data</button>
        <button class="app__menubar-item" type="button">Review</button>
        <div class="app__menubar-group">
          <button
            class="app__menubar-item"
            type="button"
            id="menu-view"
            aria-haspopup="menu"
            aria-expanded="false"
          >
            View
          </button>
          <div class="app__dropdown" id="menu-view-dropdown" role="menu" hidden>
            <button class="app__menu-item" type="button" role="menuitem" data-view="show-formulas">
              <span class="app__menu-check" data-fc-check></span>
              Show Formulas
            </button>
            <button class="app__menu-item" type="button" role="menuitem" data-view="r1c1">
              <span class="app__menu-check" data-fc-check></span>
              R1C1 reference style
            </button>
            <button class="app__menu-item" type="button" role="menuitem" data-view="grid">
              <span class="app__menu-check" data-fc-check></span>
              Grid lines
            </button>
            <button class="app__menu-item" type="button" role="menuitem" data-view="headers">
              <span class="app__menu-check" data-fc-check></span>
              Headers
            </button>
          </div>
        </div>
        <div class="app__menubar-group">
          <button
            class="app__menubar-item"
            type="button"
            id="menu-tools"
            aria-haspopup="menu"
            aria-expanded="false"
          >
            Tools
          </button>
          <div class="app__dropdown" id="menu-tools-dropdown" role="menu" hidden>
            <button class="app__menu-item" type="button" role="menuitem" data-tools="iterative">
              Iterative calculation…
            </button>
            <button class="app__menu-item" type="button" role="menuitem" data-tools="named">
              Name Manager…
            </button>
            <button class="app__menu-item" type="button" role="menuitem" data-tools="conditional">
              Conditional Formatting…
            </button>
          </div>
        </div>
        <button class="app__menubar-item" type="button">Help</button>
      </nav>
      <input type="file" id="file-input" accept=".xlsx,.xlsm" hidden />

      <!-- ── Toolbar ribbon ────────────────────────────────────────── -->
      <div class="app__toolbar" role="toolbar" aria-label="Spreadsheet toolbar">
        <div class="app__tool-group">
          <button class="app__tool" type="button" id="btn-undo" title="Undo (⌘Z)" aria-label="Undo">
            <svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l3-3M3 7l3 3M3 7h7a3 3 0 0 1 3 3v1" /></svg>
          </button>
          <button class="app__tool" type="button" id="btn-redo" title="Redo (⌘⇧Z)" aria-label="Redo">
            <svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M13 7l-3-3M13 7l-3 3M13 7H6a3 3 0 0 0-3 3v1" /></svg>
          </button>
          <button class="app__tool" type="button" id="btn-format-painter" title="Format Painter (⌘⇧C — double-click for sticky)" aria-label="Format painter">
            <svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 3h7v3H3z" fill="currentColor" stroke="none" />
              <path d="M10 4.5h2.5v2.5H10" />
              <path d="M6.5 6v3h2v3.5a1.5 1.5 0 0 1-3 0V9h2" />
            </svg>
          </button>
        </div>

        <span class="app__tool-sep" aria-hidden="true"></span>

        <div class="app__tool-group">
          <button class="app__tool app__tool--mono" type="button" id="btn-currency" title="Format as currency">$</button>
          <button class="app__tool app__tool--mono" type="button" id="btn-percent" title="Format as percent">%</button>
          <button class="app__tool app__tool--mono" type="button" id="btn-decimals-down" title="Decrease decimals">.0</button>
          <button class="app__tool app__tool--mono" type="button" id="btn-decimals-up" title="Increase decimals">.00</button>
          <button class="app__tool app__tool--mono" type="button" id="btn-autosum" title="AutoSum (Σ)" aria-label="AutoSum">Σ</button>
        </div>

        <span class="app__tool-sep" aria-hidden="true"></span>

        <div class="app__tool-group">
          <button class="app__tool app__tool--bold" type="button" id="btn-bold" title="Bold (⌘B)">B</button>
          <button class="app__tool app__tool--italic" type="button" id="btn-italic" title="Italic (⌘I)">I</button>
          <button class="app__tool app__tool--underline" type="button" id="btn-underline" title="Underline (⌘U)">U</button>
          <button class="app__tool app__tool--strike" type="button" id="btn-strike" title="Strikethrough">S</button>
        </div>

        <span class="app__tool-sep" aria-hidden="true"></span>

        <div class="app__tool-group">
          <button class="app__tool" type="button" id="btn-align-left" title="Align left" aria-label="Align left">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M2 4h12M2 8h8M2 12h12" /></svg>
          </button>
          <button class="app__tool" type="button" id="btn-align-center" title="Align center" aria-label="Align center">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M2 4h12M4 8h8M2 12h12" /></svg>
          </button>
          <button class="app__tool" type="button" id="btn-align-right" title="Align right" aria-label="Align right">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M2 4h12M6 8h8M2 12h12" /></svg>
          </button>
        </div>

        <span class="app__tool-sep" aria-hidden="true"></span>

        <div class="app__tool-group app__border-picker">
          <button
            class="app__tool"
            type="button"
            id="btn-borders"
            title="Borders"
            aria-label="Borders"
            aria-haspopup="menu"
            aria-expanded="false"
          >
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="2.5" y="2.5" width="11" height="11" /><path d="M8 2.5v11M2.5 8h11" /></svg>
          </button>
          <div class="app__menu app__border-menu" id="menu-borders" role="menu" hidden>
            <button class="app__menu-item app__menu-item--sample" type="button" role="menuitem" data-border="all">
              <span class="app__border-sample app__border-sample--all" aria-hidden="true"></span>
              All borders
            </button>
            <button class="app__menu-item" type="button" role="menuitem" data-border="top">Top border</button>
            <button class="app__menu-item" type="button" role="menuitem" data-border="bottom">Bottom border</button>
            <button class="app__menu-item" type="button" role="menuitem" data-border="left">Left border</button>
            <button class="app__menu-item" type="button" role="menuitem" data-border="right">Right border</button>
            <div class="app__menu-sep" role="separator"></div>
            <button class="app__menu-item" type="button" role="menuitem" data-border="clear">No border</button>
            <button class="app__menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-border="gridlines">
              <span class="app__menu-check" data-fc-check></span>
              Grid lines
            </button>
            <button class="app__menu-item" type="button" role="menuitem" data-border="format">More borders…</button>
          </div>
          <button class="app__tool" type="button" id="btn-merge" title="Merge cells" aria-label="Merge cells">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="2.5" y="3.5" width="11" height="9" /><path d="M5 6.5h2M9 6.5h2M5 9.5h2M9 9.5h2" stroke-dasharray="0" /></svg>
          </button>
          <button class="app__tool" type="button" id="btn-wrap" title="Wrap text" aria-label="Wrap text">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4h12M2 12h6M2 8h8a2.5 2.5 0 0 1 0 5h-2M9 11l-2 2 2 2" /></svg>
          </button>
        </div>

        <span class="app__tool-spacer"></span>

        <div class="app__tool-group app__freeze">
          <button
            class="app__tool"
            type="button"
            id="btn-freeze"
            title="Freeze panes"
            aria-label="Freeze panes"
            aria-haspopup="menu"
            aria-expanded="false"
          >
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="2.5" width="11" height="11"/><path d="M2.5 6h11M6 2.5v11"/></svg>
          </button>
          <div class="app__menu" id="menu-freeze" role="menu" hidden>
            <button class="app__menu-item" type="button" role="menuitem" data-freeze="row">Freeze first row</button>
            <button class="app__menu-item" type="button" role="menuitem" data-freeze="col">Freeze first column</button>
            <button class="app__menu-item" type="button" role="menuitem" data-freeze="selection">Freeze up to selection</button>
            <div class="app__menu-sep" role="separator"></div>
            <button class="app__menu-item" type="button" role="menuitem" data-freeze="off">Unfreeze</button>
          </div>
        </div>

        <div class="app__tool-group app__freeze">
          <button class="app__tool" type="button" id="btn-sort" title="Sort & filter" aria-label="Sort and filter" aria-haspopup="menu" aria-expanded="false">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h10l-4 5v5l-2-1V8L3 3z" /></svg>
          </button>
          <div class="app__menu app__sort-menu" id="menu-sort" role="menu" hidden>
            <button class="app__menu-item" type="button" role="menuitem" data-sort="asc">Sort A → Z</button>
            <button class="app__menu-item" type="button" role="menuitem" data-sort="desc">Sort Z → A</button>
            <div class="app__menu-sep" role="separator"></div>
            <button class="app__menu-item" type="button" role="menuitem" data-sort="filter">Filter…</button>
            <button class="app__menu-item" type="button" role="menuitem" data-sort="filter-clear">Clear filter</button>
            <div class="app__menu-sep" role="separator"></div>
            <button class="app__menu-item" type="button" role="menuitem" data-sort="dedupe">Remove duplicates</button>
            <div class="app__menu-sep" role="separator"></div>
            <button class="app__menu-item" type="button" role="menuitem" data-sort="conditional">Conditional formatting…</button>
            <button class="app__menu-item" type="button" role="menuitem" data-sort="named">Named ranges…</button>
          </div>
        </div>
      </div>

      <!-- ── Sheet host (core mounts formulabar + grid here) ───────── -->
      <div id="sheet" class="app__sheet"></div>

      <!-- ── Bottom: sheet tabs + status ───────────────────────────── -->
      <footer class="app__bottombar">
        <div class="app__tabs" aria-label="Sheets">
          <button class="app__tabs-nav" type="button" id="btn-sheet-prev" title="Previous sheet" aria-label="Previous sheet">
            <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3l-5 5 5 5" /></svg>
          </button>
          <button class="app__tabs-nav" type="button" id="btn-sheet-next" title="Next sheet" aria-label="Next sheet">
            <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3l5 5-5 5" /></svg>
          </button>
          <div class="app__tabs-list" id="sheet-tabs" role="tablist" aria-label="Sheets"></div>
          <button class="app__tab-add" type="button" id="btn-sheet-add" title="Add sheet" aria-label="Add sheet">
            <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M8 3v10M3 8h10" /></svg>
          </button>
        </div>

        <div class="app__status" aria-live="polite">
          <span class="app__status-block app__status-block--state">
            <span class="app__status-dot" aria-hidden="true"></span>
            <span id="status-state">Ready</span>
          </span>
          <span class="app__status-block app__status-block--selection" id="status-selection">A1</span>
          <span class="app__status-block app__status-block--metric" id="status-metric"></span>
          <span class="app__status-block app__status-block--objects" id="status-objects" hidden></span>
          <span class="app__status-block app__status-block--engine" id="status-engine">—</span>

          <!-- Excel-style zoom control: − [100%] + with a thin slider rail. -->
          <span class="app__status-block app__zoomctl" aria-label="Zoom">
            <button class="app__zoom-step" id="btn-zoom-out" type="button" title="Zoom out" aria-label="Zoom out">−</button>
            <span class="app__zoom-rail" aria-hidden="true">
              <span class="app__zoom-rail-fill" id="zoom-rail-fill"></span>
              <span class="app__zoom-rail-thumb" id="zoom-rail-thumb"></span>
            </span>
            <button class="app__zoom-step" id="btn-zoom-in" type="button" title="Zoom in" aria-label="Zoom in">+</button>
            <span class="app__zoom" id="zoom-display" title="Cycle zoom">100%</span>
          </span>
        </div>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
