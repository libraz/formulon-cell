name: Publish and Create Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install -g npm@11.5.1
      - run: corepack enable
      - run: corepack prepare yarn@4.5.0 --activate

      - uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - run: yarn install --immutable
      - run: yarn lint
      - run: yarn build
      - run: yarn typecheck
      - run: yarn test --run

      - name: Prepare packages for publish
        run: |
          cp LICENSE packages/formulon-cell/
          cp LICENSE packages/formulon-cell-react/
          cp LICENSE packages/formulon-cell-vue/

          # Replace workspace:* dependencies with actual version
          CORE_VERSION=$(node -p "require('./packages/formulon-cell/package.json').version")
          for pkg in packages/formulon-cell-react packages/formulon-cell-vue; do
            jq --arg v "^${CORE_VERSION}" '
              .dependencies |= with_entries(
                if .value == "workspace:*" then .value = $v else . end
              )
            ' "${pkg}/package.json" > "${pkg}/package.json.tmp"
            mv "${pkg}/package.json.tmp" "${pkg}/package.json"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            Automated release for ${{ github.ref_name }}.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish in dependency order: core first, then framework packages
      - name: Publish @libraz/formulon-cell
        working-directory: packages/formulon-cell
        run: npm publish --access public

      - name: Wait for registry propagation
        run: sleep 15

      - name: Publish @libraz/formulon-cell-react
        working-directory: packages/formulon-cell-react
        run: npm publish --access public

      - name: Publish @libraz/formulon-cell-vue
        working-directory: packages/formulon-cell-vue
        run: npm publish --access public
