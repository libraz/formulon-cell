name: CI

on:
  push:
    branches: [main]
    tags-ignore:
      - 'v*.*.*'
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'yarn.lock'
      - 'tsconfig.base.json'
      - 'biome.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'yarn.lock'
      - 'tsconfig.base.json'
      - 'biome.json'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: corepack enable
      - run: corepack prepare yarn@4.5.0 --activate

      - uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - run: yarn install --immutable
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn build:all
      - run: yarn test --run
